# Production-style stack: PostgreSQL + API
# From repo root: docker compose up --build
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: lecture_room
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./server
    restart: unless-stopped
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/lecture_room
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env — min 32 chars}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      HOST: 0.0.0.0
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
